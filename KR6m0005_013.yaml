body:
  text: 安慧菩薩造百譯經三藏朝散大夫試鴻臚卿光梵大師賜紫沙門臣惟淨等奉詔譯觀時品第十九復次勝論師言若因若果一性異性悉斷滅者此非道理應知諸法說有三時若彼三時無生起者即彼諸法生滅分位而悉不住是故無斷論者言所言勝義諦中有三時者為一性邪為異性邪若一性者即此過去未來現在所起無別以彼三時同一體故若過去未來現在諸法離體可取者是即過去未來現在諸法不得成就豈無過邪以彼過去未來現在諸法互相離所作故若言異性者即一性中無三時可有或無差別者又過去未來現在諸法不有此亦有過若離未來法體及離現在法體過去法體有所成者即無生滅法故如是決定若有三時可得此中亦無思惟分位謂未來等法無異性故此無過失以無別異過去未來現在三時法體和合云何現在因過去有是故此中無有一時亦無異時亦無有法是常住故是故過去未來現在法體不有以差別無體異性不生故若復如是次第觀時決定三時悉無所得以無分位故此中有問若現在未來與過去時互相因待應有體邪或無因待此復云何故頌荅言若現在未來因過去時者彼現在未來過去時已有釋曰若現在未來因過去有者是即三時同一體有故非道理謂以前前法壞滅已後後法體若不相違即過去時中三時同體以差別同體故若過去時有彼二時此即一切皆有三時亦應現在一一時相過去時有是故三時悉無因待道理可得復有人言若現在未來不與過去同時有者次第而轉應無過失邪故頌遣言若現在未來過去時中無彼現在未來因何而可有釋曰過去諸法破壞即滅亦無有體云何與彼現在未來而為因待見無所成故復有人言若現在未來不因過去可有成邪故頌遣言現在及未來若不因過去即無彼二時不因過去故釋曰以現在未來自體亦無因待可成此即止遣現在未來體不有故是故三時皆無所有復次頌言若因過去時或不因過去如是餘二時釋曰應知此說若現在未來因過去有者即過去未來亦因現在而有餘二遮遣次第應知是故三時皆非可見分量而有若非見是法已所有上中下等諸法悉無互相因待可成由此過去未來現在三時無得如是所見皆世俗諦勝義諦中云何有體復次頌言此如前所說上中下等法應知無一異亦無次第轉釋曰對待中故即有上下若彼中法先離自體後復還於自體中生此即相違以自體藂雜故若說別有中法因待又復無彼自體可有若中自體既無因待上下二法即無有體若或中無因待上下二法有所成者彼二亦無因待是二若有所取非此所見如是因果決定遮遣復次數論師言勝義諦中如應知有因有果亦有三時其義顯明若不尒者即諸法無成亦無能成所成道理論者言若境界事即彼因法或說能成所成果體於義利中有所發起若有異見說如杖合此非所說復次數論師言若因若果及彼三時應悉有生謂以身語有所作故論者言若彼能作及彼所作如是一切皆無異性汝於是中云何分別謂以決定無異性故譬如十指舒即成長屈即為短亦非離諸指外別有長短二性分別三時亦然無別分位分別可得此世俗中無一性異性道理可取如是長短二法亦無一性分別勝義諦中決定應知無此道理且如長之自體復對待長此中亦無長性可成譬如自佗而彼長性亦不與短及二俱性有所相違何以故俱有過失故所有短性亦如是說復次勝論師言亦無長短二性互相因待以多因故以大因故時分差別故謂以長性異於短性彼諸指等一切物體長長增減諸體雖假互相因待然於自類法中亦無長性因待長性於中而復短性可有如彼白色因待白色於中復有青邪可有非多因中而有差別此復云何若有功用因差別可生此即不說為長如佗性故若以同異相因待者而彼長性亦不可說同異因待若言因待者有其同異即有所待由如是故無長性可有且止是說如是大小上下先後等法亦然應知諸一性等中若有一性即無二無多性如中等所說此中一切而悉遮遣應如是見此復云何若言一性即是一性等體然或作業功用同異和合而一性等法還有所起或於無因待法中若有二體一性亦然即二性等所得藂雜譬如有牛所糞成團是牛與團為一為異若離牛體亦即無別相因待法亦無牛體可有所出異處故若或後時有其異體此即別異而有所得所出外體故或言無者又非一體而有所斷此說即見牛體居多乃有過失何以故此無多體故若於此中如是解了即知勝義諦中有彼三時謂以時分積集有體故若無積集所成法者何故時增說有剎那由彼剎那有積集故乃有臘縛牟呼栗多夜摩等時差別所成故頌遣言時不住無取時住亦無有離時何有體異體亦無時釋曰此畢竟說皆悉同上所言剎那者彼無分位亦無後法和合可有積集無體故所言臘縛者此中亦復何有所取所言牟呼栗多等者若有此法與先後剎那而和合者上頌遣言時住亦無有是故若有所取即無諸行自體可得若離相續壞性無別剎那可取諸有時相亦無時體剎那轉易若先後同體及初分後分諸時有分別者此理不見若言有者彼何所取若時無取又云何有剎那臘縛牟呼栗多等時分施設若尒云何有彼時分緣法施設此說畢竟何以故未來未生而彼諸行無分位故現在分位隨轉不住過去分位已滅無體是故應知彼一切法亦如所說諸所施設悉無別異復次勝論師言如是應知有為法外別有時相以有體故譬如蟻聚成於行列蟻相有體此義可明如彼蟻聚多體所作同時所作故論者言此非同時謂以遲速前後異故今不可見若如是者即離能作所作作用墮過失故此中如是若有時者即果差別乃有多種時體若無果法差別此應見因是即一體若同時因性如是有成又墮一向之過故知彼一切處所向一切皆是緣生法義譬如畫工見諸畫色從畫色生諸體形狀此即顯見事相差別時法亦然此中若無差別即無所得謂以欲勤功用先以二手作諸差別所成畫相為從畫工作用差別而有成邪為眾色成邪為和合成邪彼等云何見是一性無差別法此或有別異邪若別異者是果即有自分和合彼意若以自體和合差別有生是即緣無差別所見畫工先當舉手而起所作差別因中有所對待即采畫作用力能有成若無別異即無差別對待火與色合種種所成如其色法積極微等差別對待亦無別異如先所說彼等如是諸所發起悉無所得復次數論師言無如是時而彼時緣亦無因中對待有性亦無佗等諸緣可說發起時相諸有疑惑顛倒計有時者今悉遮遣此中意者若物體有性即有時相非無果利論者言此中亦無少法可有勝義諦中如理所說是故云何有時可得彼無異故觀因果品第二十之一復次毗婆沙師言勝義諦中如是有時以種子等共所作故非不有時若應時者即種子等及水土諸緣和合力用能生牙等此所說時即是一時和合有體論者言云何有彼諸種子等應時和合能生牙等何以故若諸牙等先有所起即彼諸緣不復有生云何諸果由彼因緣和合有生或不有者此復云何故下頌言若謂眾因緣和合生果者和合中有果何湏和合生釋曰此無有生若法已有即不復生此即止遣法自相故復有人言若尒即無因緣和合可有故頌荅言若謂眾因緣和合生果者和合中無果云何和合生釋曰此即比量無體果法不生今此遮遣有生故無所生若言因緣和合果法有體者皆是增上所作復次頌言若謂眾因緣和合有果者和合中無取何有果可取釋曰於和合中無有性故如未生物體和合法中既無所取智者於中不起作意此中亦然若因緣和合諸牙等果無所取者即無體可成若有性遮遣此還有過又數論師言諸作力用有其能所皆無異性若自體力用能有其果即因中微細力能非果體有若異於果亦無所得如是決定如先所說若果法麤體而不有者彼即無因是即果法麤體而無力能於諸作用能所法中且無異因亦無異果於出世法中亦無少法繫属所起如我宗後頌言若謂眾因緣和合無果者是即彼因緣與非因緣同釋曰此頌意者以果空故若果體空即止諸因緣何以故謂因生果因體力能相用壞已自果即滅若或不滅此復云何故頌遣言因若未與果是因先滅者因滅而果生果起即無因釋曰不欲有其無因之果墮多過失故復次頌言若因緣和合如是果同生能生及所生亦如燈與光釋曰如影如牙是義應知復次頌言亦非先有果然後方和合生已還復生即墮一時過此中有問若能生所生同在一時此有何過荅已生未生若因若果能生所生二法不和合謂以因果性壞互相有其能生所生此墮過失復有人言先有果生然後因緣和合顯明邪故頌遣言若先無和合而有果生者是即離因緣乃成無因果釋曰此中亦無無因之果道理可得又數論師言若因法向果即無無因之果謂因法雖壞後有果起論者言此中亦無因法先滅後有果成若因滅有果者彼因生成次第即無所依此言先法者即是因法因法若滅因即無體復次頌言法滅即是無壞法無別體是即前生因而墮重生過釋曰此中云何若無先法而有後法次第和合彼不可見云何前生因法體相而能重生此有過失果成因滅有別異故復有人言若法先滅不離因法自體後有法成如是有因和合可生邪論者言若因果二法前後建立有體生成即有果利若因生果已因住果中即彼果法別異有生甲辰歲高麗國大藏都監奉𠡠彫造
