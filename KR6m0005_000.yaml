front:
  text: 大宋新譯三藏聖教序迹太宗神功聖德文武皇帝製大矣哉我佛之教也化導羣迷闡揚宗性廣博宏辨英彥莫能究其旨精微妙説庸愚豈可度其源義理幽玄真空莫測包括萬象譬喻無垠綜法網之紀綱演無際之正教拔四生於苦海譯三藏之祕言天地變化乎陰陽日月盈虧乎寒暑大則説諸善惡細則比於恆沙含識萬端弗可盡述若窺像法如影隨形離六情以長存歷千劫而可久須彌納藏於芥子如來坦蕩於無邊達磨西來法傳東土宣揚妙理順從指歸彼岸菩提愛河生滅用行於五濁惡趣拯溺於三業途中經垂世以難窮道無私而永泰雪山貝葉若銀臺之耀目歲月煙蘿起香界之自遠巍巍罕測杳杳難名所以道資十聖德被三賢至道起於乾元衆妙生乎太易揔繁形類竅鑿昏明絶彼是非開茲蒙昧有西域法師天息災等常持四忍早悟三乘翻貝葉之真詮續人天之聖教芳猷重啓運偶昌時潤五聲於文章暢四始於風律堂堂容止穆穆輝華曠劫而昏墊重明玄門昭顯軌範而彌光妙法淨界騰音利益有情俱登覺岸無成鄣礙救諸疲羸冥昧慈悲浩汙物表柔伏貪佷啓滌昏愚演小乘聲聞合其儀論大乘正覺立其性含靈悟而蒙福藏教缺而重興幻化迷途火宅深喻雖設其教不知者多善念生而無量潛臻惡業興而隨緣皆墯調御四衆積行十方澍華雨於金輪護恆沙於玉闕有頂之風不可壞無際之水弗能漂澄寂湛然圓明清淨之智慧性空無染妄想解脫之因緣可以離煩惱於心田可以得清涼於宇宙朕慙非博學釋典微間豈堪序文以示來者如縻螢爝火不足比之於皎日將微蠡量海未能窮盡於深淵者哉繼作聖教序真宗文明章聖元孝皇帝製高明肇分三辰方乃序其次厚載初定萬彙於以發乎端清濁之體既彰善惡之源是顯然後以文物立其教以正典化其俗利益之功同歸於理於是乎像法來於西國真諦流於中夏洞貫千古真實之理無以窮囊括九圍玄妙之門莫能究言乎妄想則五蘊皆空現乃真容則一毫圓滿廣大之教豈能紀述者哉伏覩太宗神功聖德文武皇帝法性周圓仁慈普布化蠻貊則萬邦輻湊躋蒸民於仁壽之鄉崇教法則四海雲從惠蒼生於富庶之域見尊經之浩汗設方便以救沉淪知法界之恢宏行精進而攝懈怠乃擇其邃宇校彼真文命天竺之高僧譯貝多之佛語象管翻成於金字珠編復置於琅函龍宮之聖藻惟新鷲嶺之苾芻仰歎由是三乘共貫四諦同圓盡苦空真正之言顯祕密精研之義讚相相乎實相論空空乎盡空華嚴之理合軌轍金像之教同規矩朕纘嗣丕構恭臨寶圖常翼翼而撫兆民每兢兢而守先訓以至釋典尤未精詳諒其幽深曷能探測有譯經西域僧法賢奏章懇切致意專勤以先皇帝大闡真風高傳佛旨興前王之墜典振覺路之頺綱欲旌天造之功庸用廣聖文之述作請豫製序繼聖教焉自聖考上仙追號罔息政事之外何暇經心今已禫除思臻微奧雖幼承慈誨奈夙乏通才焉窮乎法海之津涯莫造乎空門之閫域略敷大意以徇輿情蹄涔不足擬浴日之波尺箠豈能量昊天之影聊述短序以紀聖功者焉
