body:
  text: 安慧菩薩造百西天譯經三藏朝散大夫試鴻臚卿傳梵大師賜紫沙門臣法護奉詔譯觀合品第十四復次有外人言勝義諦中有其眼等及諸行法彼說和合如佛所言有三種法謂眼根色境眼識合故生觸由此所說餘耳等法亦復如是隨起諸結此名和合非不有故如龜毛等是故世尊或說諸法有所和合論者言世尊說者此等決定非勝義諦是故頌言能見及所見見者等各異彼更互相望一切皆無合釋曰此義即是二二相望復次頌言如是染染者及彼所染法瞋等餘煩惱餘處三無合釋曰彼一切法更互相望皆悉無合何所以邪復次頌言異共異有合彼見等諸法異性無所有故不可說合釋曰自體如是故更互相望異性無體復次頌言非唯見等法異性無所有釋曰云何異性如瓶衣等次下頌言餘諸法皆同無異性可得釋曰此等所說非語言中而能生信無異性因此復云何復次頌言異因異有異異離異無異若法從因出彼無異可得釋曰異法因待異法即有其異此義應知法自性等云何有異若先無異後乃因異有異此即相違亦非諸法有異對待異性可得此應思擇復次頌言若異異於異離異無所得彼異不異異離異無有異釋曰亦無異因對待而有於異法中離無所得如火自性離自體中即無熱性譬如瓶等離於自體不見異性此中應知勝義諦中無有異性勝論師言若說異性者即是同法差別功能今此亦應有異可得如無異物自體對待論者言若彼異物離於自相有異可取者而彼同法為異法中住為不異法住此復云何復次頌言異中無異性不異中亦無無有異性故即無彼此異釋曰異與異性合無此道理異與不異亦互相違無異性中而彼異性定當止遣若其異性有所得者決定相違異性對待有不異性畢竟性中既無異性亦無不異何以故本無異性故勝義諦中無彼此異復有人言若法自相互相衰變彼有異故可說為異論者言若有異相對待彼法此即可說有其衰變既先無相後有衰變即非道理若或先有衰變此亦不然如是決定離其衰變異相不有是故異非異性無有和合復次頌言一法不自合異法亦不合釋曰何所以邪合義無體故異中即無異法可有若有異性即有別異過失可見是故無有少法可合合法合時若分別者合即無合此復云何次下頌言合法及合時合者悉皆無釋曰由如是故作者作業及所作法亦悉不有云何見等諸法更互相望而有合邪觀性品第十五復有人言如汝所說若自分別有所成立彼一切法有其自性皆虛妄法然彼諸行汝亦說為虛妄法者即能成所成而有相違論者言諸法自性若從因緣有所生起彼非自性以自性無所作道理與現緣法有相違故勝義諦中若法增相自相不可得故無分別智起時如實照了若有所得皆是世俗所行此止遣者即與現緣有所相違以不生故勝義諦中若有少法而可得者彼法自體悉無所有復次頌言從因緣和合諸法即無生釋曰無自性故若先有自性云何從彼因緣所成次下頌言若從因緣生即自性有作此中應問若此作法有何過失故頌答言自性名作法云何當可得自性無虛假離他法所成釋曰本非自性有所作法若有所見及有所得皆因緣成此中如是止遣對治論者言我此比量勝義諦中自性皆空如是所有眼等諸法應知皆是因緣生性如幻所作男女等相彼相若有自性可得即非因緣對待所成如涅槃等此說即與他比量相違或有人言如實義者且如火以熱為自性若火先從因緣所生即有所作乃非自性容有所作道理可得若爾火即有其先知是故當知諸法自性無有虛假離他法成復有人言諸法自性無有別異此無過失若如所說從因緣生火之熱性云何先知阿毗曇人言諸法自性如是決定無有虛假離於他法因緣所成者火之熱性此復云何先有所得此中若先有體可得即非自性火云何有經部師言若法自性無有虛假離他法成此中決定或有所得彼即不有是故自性若或容有少法可作即他法對待此不和合如是自性無有作者此復云何有其所作若先不有因緣所作即無過失若先有法何名無體論者言此說不然何以故彼無所有云何無所有當知有作皆是緣法對待所得彼即無有少法可作何以故若法現轉即先不有何有所作若法現轉此復云何說名所作若於現轉有所作者其或先無轉時容有所作此即過失是故若先無法即無所作如兔角等彼何無作若或作者有其力能彼即有作譬如石女無子云何有名而可詮表相似之法能與不能能所分別亦非不有言說分別何以故因有說無是無亦不可得如是決定悉不可以言說分別設或能有物性亦無異因異法可得云何決定有其所作若法緣聚彼緣差別而亦不成以於是法不明了故即於是中見作者性譬如空花是故勝義諦中法無自性勝義諦中有法皆是自性對待復次頌言若法無自性云何見他性自性於他性亦名為他性釋曰若無自性即無他性何以故若自性有成彼性變壞容有他性既無自性何有他性此復云何若說自性亦名他性如是異法和合生觸此即他性法無自性故若說有他性彼即不有是故無有他性此亦不然何以故若自性若他性二俱無性有所得者彼說皆空復次頌言離自性他性復云何有法若有自他性即諸法得成釋曰無所有故諸法自性無差別中無法可有此中若復有所遮遣如是還成有法可得復次頌言有法若不成無法亦不成有壞名為無世人說無體釋曰此說如理何所以邪法壞名無世人說彼以為無體若無法可壞彼所說無亦即不有是故此無亦不可立復次頌言若見自他性或有體無體彼則不能見如來真實義釋曰此不和合是故諸佛子等普盡世閒悉為攝受而能長時荷諸重擔於自他性悉無所見以無分別智止息一切別異所起自性他性此云何知為依雜阿含等教理證成是故頌言世尊已成就離有亦離無教授迦旃延應離有無二釋曰佛告迦旃延世閒衆生依止二法無始以來著有著無又如佛告阿難言世閒衆生執有著常執無著斷此中應問若勝義諦中無自性等云何能見彼真實義答此說見實者應知皆是因緣生法世俗分位所成立故如實觀時非勝義諦復次頌言若自性他性或有體無體自體有異性法即不可得釋曰此中止遣諸色相見當觀真實如尊者提婆所說頌言從識種子生成三有境界見境界無我三有種子滅論者言若法自體有異性者亦應決定有法可得何以故諸法自體若離因緣無所得故此中意者無所作性復次頌言若見彼異性非諸法有體云何自體無異性當可得釋曰若著於有此成過失若法自體有性可得即非因緣以先無法有所造作若彼自相息滅後有所得此亦不然如先意樂因緣所作此中亦復無所詮表云何自性所成而有異性可得亦非性與無性相對和合此中若法不滅後有所得彼亦不有云何自體實有異性可得亦非有法自色相中自體有實亦非無法相中異性和合何以故性與無性二相違故復次頌言言有即著常言無即斷見是故有無性智者無依著釋曰此中云何著有無性墮斷常見故復次頌言若法有自性非無即是常先有而今無此還成斷見釋曰法無自性亦復非彼無性可得以離所作性故若執有性乃著常見若法先有而今無者此即壞法亦成斷見若爾即於一切愛非愛果所得悉壞墮斷常見世法相違是故應知若見諸法無有自性即見真實此即證成中道之義觀縛解品第十六此中應問云何諸法於勝義諦有性無性二俱無體若其然者即無生死亦無涅槃無縛無解以勝義諦中諸法無性故如是即應一切皆無此云何說衆生於彼諸趣往來數數生滅答若言諸行或彼衆生有往來者此所分別為是常邪為無常邪二俱不然故下頌言諸行若輪轉常即無往來無常無往來衆生亦同等釋曰若是常者即無所作生滅無性故又常即畢竟寂滅性故若無常者已滅諸法不復生故路伽邪陀人言汝說諸行及彼衆生無往來者成我所成何以故實無他世來生此世亦無此世復還他世如我宗頌言汝今且觀如是人諸根圓具及所行又若說彼有多聞或為惡獸所食噉恣他所食為所棄過去他身彼即無不還後世無怖心應知此身唯行聚此中意者若有覺常住即非如是衆生及行可說往來故我所說應如是行若有人言此生之前有過去生而可為因此不遮遣何以故如入胎初覺決定自體相續有入次前覺心不離境界有能取故如後起覺我宗說者此亦不然且非今生離眼等所依決定有覺若有覺心次於入胎初覺即眼等所依定有所得以先有故若爾即有無始往來生死隨轉彼未來生亦可相因未死有覺如現起覺若有覺相續可為因者又離彼所依無相續覺何以故唯有一覺乃至未終常如是住故論者言汝此所說譬喻無體亦非道理何以故且如提婆達多於相續中色覺與聲覺彼非不異境界別故如他人相續覺復有人言彼諸取法若一若異常與無常皆不可說論者言諸取往來常與無常俱成過失何所以邪故下頌言人若有往來於蘊處界中五種推求無誰受往來者釋曰非蘊處界諸色法中有相可取離行及識審細推求悉不可得如石女子五種推求彼說往來亦不可得此中應問若如所說此蘊之外無別蘊體亦不即此蘊者云何如來亦具五蘊故頌答言能取及所取無諸有往來無有即無取何有往來者釋曰若先離取即復無取亦非同時取體可生彼不同時性無有可立或復離體而不有故此義即是無別有取以衆生無體故此中意者如是即無能取所取由此亦無生死可得甲辰歲高麗國大藏都監奉𠡠雕造
