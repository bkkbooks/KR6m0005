body:
  text: 安慧菩薩造西天譯經三藏朝散大夫試鴻臚卿傳梵大師賜紫沙門臣法護等奉詔譯觀顛倒品第二十三之餘復次頌言此若無有善當云何有貪又若無不善云何當有瞋釋曰若貪瞋無體癡亦無體此亦無別癡法可說復次經部師言勝義諦中亦有顛倒經中有說如佛所言若無常計常此名顛倒無我計我苦中計樂不淨計淨皆名顛倒於無常等若執無常此非顛倒又經部師此中意言顛倒有二種一者隨順生死二者隨順涅槃若於生死執為常者此名隨順生死顛倒若執無常此名隨順涅槃顛倒所言隨順涅槃起顛倒者此說即是自體顛倒方便斷故論者言汝此所說有何義邪下頌遣言若無常謂常此執顛倒者空中無無常何有顛倒執釋曰空中無彼無常可成諸法亦無若彼無者何有常法執為顛倒復次頌言若無常謂常此執顛倒者無常若成執空何非顛倒釋曰常與無常二俱無故此中意者無常及空皆是顛倒餘無我等亦如是說復有人言應知諸法有其能執所執執法執作用等皆有體故若不有者應無能執所執道理論者言如汝所言諸有執者為因所成邪為復別有執法成邪為復共相相違有體邪若別有執者即彼作者有何體邪故頌遣言能執業用境此等目性空皆是寂滅相是故無有執釋曰如其增上所說證成如汝所說因喻無體謂言勝義諦中有顛倒故即此顛倒與非顛倒言有體者故頌遣言執性無有故何言邪與正計無常等法而成於顛倒釋曰此中何有顛倒與執俱無體故若言有執此復云何謂無決定顛倒可成以顛倒性同體相違故復次頌言無未生顛倒及已生顛倒亦非顛倒時有顛倒生起釋曰此中云何謂離性故譬如聖人若離顛倒及不顛倒俱無體故若如汝說二俱有過汝今應當遠離慢心審自思察云何顛倒自體可生故下頌言未生當云何有顛倒可得顛倒若不生何處有顛倒此復云何故下頌言若常樂我淨此四是有者彼常樂我淨是即非顛倒釋曰此中意者謂所知顛倒故此中所言我者即我等執或於我等四種法中起顛倒執此名顛倒復次頌言若常樂我淨此四是無者彼無常苦等是即應不有釋曰應知此彼俱無和合是中遮遣無我等故此中意者若有所對待彼無我等而即有成然無我等別異無成彼我等見即非顛倒如是常等計執應斷有何功用得如是邪故下頌言若顛倒法滅如是無明滅以無明滅故諸行等亦滅釋曰勝義諦中俱無自體以性離故若言煩惱有斷有成即彼煩惱為有體有色為無體無色應知皆是一向執故若言煩惱有實自性而可成者此中何法有所成邪此說畢竟故下頌言有何法可斷此中云何斷若實有自性自體無繫屬復次頌言若煩惱無實無故何名斷離有體無體有何法可斷觀聖諦品第二十四之一復次有自部人說是頌言若一切法空無生亦無滅以無生滅故四聖諦亦無釋曰彼意所說以法空故如石女兒此若無者即有過失此中云何生法無體謂集諦無體故云何滅無體苦諦無體故若苦集無體滅亦無體滅無體故向滅道諦而亦無體是故頌言若知及若斷修證等作用如是四聖諦無體即不有釋曰若苦等聖諦皆無體者即知苦斷集證滅修道而悉不有復次頌言四聖諦若無即無四聖果苦等諦若無亦無向果者釋曰四聖果者謂湏陀洹等果彼果無故無住果者湏陀洹等四是住果人無住果故亦無四向復次頌言若無八聖人是即無僧寶若無四聖諦亦即無法寶釋曰以無向果及住果者亦無和合僧寶可有以無因待故方便道不成又離四聖諦即無法寶故下頌言若無法僧寶云何當有佛若如汝所說是即破三寶釋曰能覺所覺若無體故亦無有佛次復云何故下頌言若因果體空即無法非法世俗諸所行亦破一切法論者言此如是等汝說皆非彼諸法性即是空性空若不有破諸所成若或執著諸法皆空又即世閒若法非法一切所作果體法用耕植等事世俗所行皆悉破故故下頌言諸法無自體有執非道理此中佛所說空故有行相釋曰不應如是破於空義所言空義者此中所謂空所緣義離色相故而能息滅一切戲論以無分別智說諸行相煩惱生等最勝解脫如是空義證成中道遠離二邊是中亦非所緣相應又復勝義諦中諸法皆空離二邊故諸說行相煩惱所知障等皆是空義彼世俗諦色等無體復次頌言諸佛依二諦為眾生說法一是世俗諦二是勝義諦釋曰世俗諦者所謂世閒言說如說色等生住滅故又如說言提婆達多來去沒囉賀摩達多解脫此等世閒言說不虛此即說彼是名世俗諦法如世假聚等法先無體故勝義諦中相似有性有體無體皆是世俗言說分別無始已來世相續故亦無少分假聚法等色體可說本來無體亦無色法次第相續色法無體故即是破散而彼色法若其無體即破散者是故非彼勝義諦相所言勝義諦者如前所說不隨他緣息諸戲論無戲論故即無分別無種種性此真實相名勝義諦又勝義諦者謂諸法因皆如實住此說名諦又勝義諦者謂境界智於勝義諦中相應和合又勝義諦者有彼勝義而能隨順無生等法宣說聞思修所成慧又勝義諦者能為勝義遮遣一切顛倒因故復次頌言若人不了知二諦差別法彼不解真實甚深佛法義釋曰謂於法等執意深重難解諸佛甚深法義不能於其無分別智所行境界有所起時與無生滅相應於此無體境界雖有所得然復與彼非境界相而共和合作是說言世俗生等諸法皆無起如是執執此一切皆是空者此等所計不解諸佛依世俗說持戒修定隨順諸法有生住滅若謂勝義諦中如是種法計為有者彼即不解真實之義何以故謂諸佛世尊依止二諦宣說諸法如前頌言若不依世俗即不說勝義不得勝義故即不證涅槃釋曰勝義諦中超越一切語言境界若復遮遣世俗諦中一切物體此即亦復不證勝義謂以勝義諦中方便宣說有世俗諦是故今此依勝義諦宣說世俗諸有行相復次有外人言諸物體皆空謂見諸蘊自體空故或即蘊有空或異蘊有空或蘊中有空論者言汝如是見皆增上慢不正見故以此惡見壞於空義如是亦能於無分別慧命作諸障難云何壞邪故頌遣言呪師法不成不善攝蛇毒惡見壞於空其義亦如是釋曰呪法不成自害其命空見亦然此中所說如下頌言故諸佛世尊不欲為說法眾生不能解以法為非法於甚深空義而實不能入以如是因故不壞復云何復次頌言汝謂我著空不空亦不有以空不有故不應生毀責釋曰著空之過還歸於汝若他所計自體有成者非正理門皆是計執成斷空故是故諸法自體無性亦非有空勝義諦中自體無性故此復云何故下頌言以有空義故一切法得成若不有空者一切法不成釋曰一切法者謂世出世閒諸所有法勝義諦中有體無體皆離自性譬如幻士有為法中生滅對待四聖諦等一切皆成世俗法中亦非有滅此等諸義如前廣說復次頌言汝今自有過而返謂我有譬如乘馬人自忘其所乘釋曰如此中說一切無生皆悉空故應如是解諸說亦然復次頌言汝若見諸法皆有自體者法若非因緣還成汝自見釋曰若見諸法有自體時即緣無對待此復云何故下頌言因果有定性作作者亦然乃至生滅等汝悉破果法釋曰此即因緣二無對待而可得故如空花等諸法無體自性空故於中起相自生怖畏若離怖者其復云何故下頌言若從因緣生諸法即無體緣亦是假名非一異可有釋曰勝義諦中緣即非緣於無生中自生怖畏但依世俗而有所成是中亦無自體可生所見皆空勝義諦中離自性故諸有施設世出世閒所成諸法但為世閒假有所得若中道義生即無生是中亦無二邊可離若如是解即因緣法亦定有因然本無生自性空故是中亦無生法可有設使勤勞施設所成皆如兔角體不有故此即證成中道之義離二邊故是故當知諸法自體一切有生皆非道理若或執彼無自性者亦非道理若謂諸法非因緣生即彼自性定無所作或謂無所作者即彼諸法時處力能決定不有以無差別故或謂諸法常有自體此亦不然故下頌言若不從緣生無少法可有由從緣生故彼皆如幻士釋曰此中意者無自性故今此若謂諸法常有自體可得還成過失故下頌言若一切不空無生亦無滅以無生滅故四聖諦亦無釋曰若生滅無體此復云何故下頌言若不從緣生云何當有苦無常是苦義彼體無所有釋曰何所以邪無所得故復次頌言苦體若不有云何當有集是故若無集此即破於空釋曰彼法自體因無對待滅亦無體復次頌言苦若有定性自性無所作自體若有著此即破於滅釋曰云何定住法中有滅可成復次頌言道若有定性修即不可得道若是可修定性無所有釋曰諸法若於彼善法中有所生起有即無常然彼諸法若有自體即無所得諸法亦無生法可成謂以生法無自體故亦不離所修復次頌言若彼苦與集及滅無所有而滅苦道諦云何當可得復次頌言若苦法不生滅法云何有苦自體無知彼法復云何釋曰若苦自體不隨知者是即不能了知苦諦作者自體亦隨住故甲辰歲高麗國大藏都監奉𠡠彫造
