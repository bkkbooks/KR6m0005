body:
  text: 安慧菩薩造百西天譯經三藏朝散大夫試鴻臚卿傳梵大師賜紫沙門臣法護奉詔譯觀縛解品第十六之餘又復有問若諸行滅及衆生滅應無分別邪故頌答言彼諸行無滅此云何可有衆生亦無滅復云何可有釋曰若法是常即無所作是故無有少法可滅何以故以法常故若是無常一向滅法此即不有復云何滅若常無常俱不可説即無過失此應思擇或有説者自體還成異義可觀若有法可滅何不有常若或言無即壞法性此乃成斷是故若有若無不可説滅或有人言所言不可説者即是如來息滅言詮是中為復有所取邪無所取邪若有所取云何不常若無所取此即成斷若復決定不可説者即諸佛一切智有所得法此中相違不能遮遣論者言滅即解脫解脫者若有我若無我有即是常若定無説又非智者所了知故復有人言諸縛解者謂因果有體相續轉時非無諸行以貪等生起因法隨有此即名縛縛生死中諸往來者又或貪等名縛出世間智若生起時貪等息滅此即名解是故不復諸趣受生論者頌言諸行生滅法無縛亦無解縛解若有作即縛解不生釋曰諸行自體相續壞滅住時無體無縛可有如外地等自體畢竟相違此即無解又或斷法無體故若斷時有得即縛解相二無分位是故無縛亦復無解或有人言諸行生時説有縛解論者言此亦不然若已生法有縛解者如是縛解二不和合若言生時又復無性如前所説衆生亦然無縛無解常即無作如虛空故若有所作即非是常亦非無常現前壞滅或有人言諸取名縛畢竟離取故名為解論者頌言若因取名縛有取即不縛無取亦不縛何分位可縛釋曰無染汙取此無有縛彼無染汙亦即不有此復云何而此無取亦復無體今所觀察亦無分位此中意者無所縛故如下頌言有衆生可縛彼縛即有體縛法彼若無如調達所縛復次頌言若先有其縛彼縛能縛身今既無所縛如去來品説釋曰此中不有能受取者以不有故即應無有縛法可得復次頌言已縛即不縛未縛亦不縛離已縛未縛縛時亦不縛釋曰由如是故無已縛無未縛亦無縛時縛法初起是故頌言已縛即不解未縛亦不解若縛中有解縛解即同時釋曰此不可説縛中有解若縛法無體云何有解若有縛可説即説有解今縛解俱無二相違故或有人言由有我故不得解脫若諸取法畢竟息滅此即解脫若如汝言我法不有云何乃有求解脫者彼解脫義當云何説論者頌言若我滅無取我得涅槃者此或有彼執還成執於取復有人言諸取根本因我我所是故我今息滅諸取如薪盡火滅有言我滅諸取當得涅槃者其義亦然彼等意者因我我所故執諸取由彼因故餘取即生是故彼取不得解脫論者頌言不應捨生死不應立涅槃有無皆成謗此説非道理釋曰若或諸行有生死可捨有涅槃可立此即都無所作可得云何乃有生死涅槃二種分別觀業品第十七阿毗曇人言若勝義諦一切皆空諸法無體者如是亦應業果俱無何故佛説有其業果如經頌言自能降伏心復能攝受他即有慈愛心此説降伏體釋曰自降伏者即身語意業止諸惡作乃能攝他攝受他者謂行布施利行愛語救怖畏等如是所作此中愛法所成名之為慈慈即是愛慈者柔軟為體此柔軟義即是慈之近相一切皆於等引心攝此有三種即一切法自他種子及所生果心法所攝最勝所持然後成果此復能攝彼一切法如有頌言思及思所生大仙所説業彼業有多種次第而分別釋曰此分別者謂身語意有三種業復次頌言彼所説思者此即是意業從思所生者所謂身語業釋曰語謂語有所表又復別有身語二業謂遠離不遠離不遠離者即無表想此無表者餘處有説名不遠離此謂起思善業我作或我不作普施心等此名遠離或不遠離如是所起此即説為無表之業或有人言有表者謂相續業無表者非唯心所得乃至無他所表如有頌言受用故生福施受用福生非福亦復然此名受用義并思為七種了知諸業法身語表無表遠離不遠離釋曰受用從生福及非福并思成七法是為諸業相是故決定諸法自相當有所得業果和合而有生死論者言亦非不壞業生果體成辦此或住邪或即滅邪此復云何故論頌言業住至果熟彼業即是常若滅即成無云何有果生釋曰若言自體相續不壞後有壞者此無因性以有壞故亦無所作果生道理滅即無體故又阿毗曇人言有相續故有果生起如我宗頌言若芽等相續芽等復生餘種先而果後不斷亦不常若不先植種果生即不能因隨果法中從芽等相續釋曰果生無異因隨果中是故種子而亦不斷若果生時種子自相無別分位此即不常此喻可成所喻法者故下頌言若心有相續心法即現轉果若離於心無相續可轉從心有相續從相續有果業先而果後不斷亦不常釋曰所説喻者次第應知此復云何故下頌言求法方便者是十白業道此世及他世得五欲勝果釋曰法依於心種子差別從修持因為法方便得十善道果法成辦由此當知若業果等不有合者是中亦無求法方便何故世尊説有果法論者頌言若如汝所説次第而分別彼有過失生其過多復大釋曰此中分別非有所成乃生過失我今略為顯示方量且如有人種地獄因以心相續故若能於彼善趣受生無此道理種善趣因惡趣受生亦非道理譬如世間植𩕳摩種芽等相續即不能生菴沒羅果或植菴沒羅種亦不能生𩕳摩之果諸異法體各各心相一切趣類自體有因善不善業和合所立分別力能表了有性此所表了因果不生如欲界繫心能起色無色界及無漏界心乃至無漏界心能起欲色無色界心此皆不有彼善等諸法所説亦然故有多種及大過失是中無此分別道理復次阿毗曇人又引頌言今我復説此順正理分別諸佛及緣覺聲聞等讚説不失如契書業如所負財界分別有四皆自性無記釋曰譬如有人從人舉債先得契書隨諸方處債無散失其後子本悉復還歸何以故以有契書故作用果成無復有壞業亦如是諸相似業所謂欲界即欲界繫乃至無漏界即無漏界有作善者具五種業復次彼不失法於何位斷邪故下頌言見道所不斷至修道乃斷是故不失法能持於業果釋曰若無漏業無漏位斷若作善者或斷不善業故無相似之業由是即無業果隨生方便因性故下頌言若見苦時斷彼即有過失有相似業故斷即壞於業釋曰若見苦時斷如是餘處次第叢雜而復善為不善不善為善此如是等即有過失若彼不善諸業法等彼位止時彼不失法即成相違是故阿羅漢於見道斷須陀洹人度果已斷彼無常業設有所壞常法所起如契書在彼作用業有體不失植種有果現滅現成有業道故彼即不滅其不善業法阿羅漢於見道斷須陀洹人果成已斷復次頌言一切相似法諸業有繫屬諸界一法生一業一法起釋曰彼所繫屬諸善等業而非對治諸果報等欲界者欲界繫色無色界及無漏界而彼對治所修諸戒由斷彼業有漏業起非不繫屬如思俱時所起諸想為根本法彼不壞業如分量得今略聊簡諸愚異生於三界中一切繫屬佛諸聲聞欲界繫屬於四界中若色有繫屬謂除欲界若無色有繫屬唯無色界如是欲色二界繫屬不續無漏界以二界業盡故對治戒無體非無色有戒體所起業用可得不見有業實所生故謂見三法從初起業至彼不失此業俱起皆具二種謂漏無漏而彼一向皆有業果復次頌言所有二種業現非無常性住至度果已如是還復生或至命終滅或至度果滅此無漏分別彼相亦無漏釋曰度果者謂至作證時斷何故作證時斷謂所繫屬滅有漏成熟滅此等分別皆是近相由是故有彼不失法能令衆生受彼種種界趣方處分量形色苦樂等法差別分別有業果報此不相違如有頌言雖空亦不斷生死亦不常業果報不失此法佛所説釋曰此中應知若業與果合界趣等分別無分位者即波一性異性皆不可説所言空者即是分別我空以補特伽羅無有分位此不可説故名為空有亦不常又壞故名空空亦不斷又生死所起諸趣相續種植先業三有隨生此亦不常煩惱業盡不有名空空亦不斷亦非先世不起業因是業不壞有業有報方便因性有如是法是故世尊以無礙智方便宣説彼一切法論者言如汝分別所説不善以不可分別相續業生故論者頌言諸業本不生非伺察可得業力心相續業果二俱壞釋曰此云何知業有壞邪以無自性故若彼諸法無有自性即彼自性如兔角等亦如業等是故應知無業可有若實有業生可説不壞如佛所言無業可壞復次頌言若業本不生業云何有壞若其有所生彼云何不壞釋曰是故佛説無所生故無業可壞當知有生壞即隨有若其無生即無有壞何以故無常性故亦無業生分位可説若畢竟滅此中云何有業可壞亦復云何有果生起如汝先説有業不壞此中亦無業與果合如是決定有所合者然以無生亦無所壞如上所説諸法次第悉無所壞已生諸法種種分位以無壞故若業若果二俱不生或有人言若法不生者彼過去未來諸有物體亦應不生不生諸業無自性故如論者先説業無自性無生法可立者諸修涅槃道者名住梵行離涅槃道有所修者名住非梵行若非梵行者或得涅槃修梵行者應墮地獄此即壞世間法所作相違若業是無作即耕植等世間法壞如是亦應所作罪福相對不有世間何言此作福者此造罪者論者頌言若法有自體有業而可住二世受報已彼業還復在釋曰業若有體彼受報已而還復在若無自體差別可有如汝先説差別所得即成過失阿毗曇人言勝義諦中定有諸業有煩惱體為彼因故若有其因業非不有論者頌言此諸業煩惱業因煩惱成彼煩惱無實業云何有實釋曰勝義諦中若有煩惱自性即彼自性著於常法以無所生前已遮遣如是此中因義不成遮遣相似性故或有人言勝義諦中有業煩惱而為身因身果有故論者頌言若説業煩惱以為身因者業煩惱自空身因復何有釋曰説身因者是世俗諦非勝義諦勝義諦中業煩惱空此中所説因義不成甲辰歲高麗國大藏都監奉敕雕造
