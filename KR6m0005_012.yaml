body:
  text: 安慧菩薩造百西天譯經三藏朝散大夫試鴻臚卿傳梵大師賜紫沙門臣法護奉詔譯觀業品第十七之餘或有人言勝義諦中業果受者此皆有體如佛所言世間衆生無明所覆愛結所纏長遠世中與生死合不知先際又復說言衆生自作一切罪業如是還復自受果報如有頌言衆生無明覆愛結所縈纏作作者受者不一亦不異釋曰自所作業自受果報此說畢竟此中無異相續所取果及受者皆有其體是故勝義諦中實有業果何名為業謂作者果一切有作衆生當受論者言汝所說業為從緣所作或非緣所作此復云何二俱不然次下頌言業不從緣生不從非緣生見有業相違是故無作者釋曰若有諸業從緣生者即實不實果乃有所起故於勝義諦中若有所見即成相違既無有業何有作者復次頌言無作者作業何有業生果既無實有業受者當何有釋曰若受者有體此因義不成阿毗曇人言若如汝言無業無果此乃謗無業果即成邪見論者言若業若果或有或無此不可說著斷常故此復云何故下頌言如佛神力化化成具足相是化復起化初化名化者諸法如化相作作者無作說作者等體皆云何可有釋曰所起化時此中云何可說作者及彼作業有實體性今所顯示其復云何皆如化相而無有異復次頌言諸法無有體如乾闥婆城煩惱業及身作者果亦然釋曰當知諸法如乾闥婆城及如陽焰夢等諸相變化亦然如陽焰等因緣和合所生諸法皆是世俗有所成立善趣惡趣衆生輪回於世諦中悉有所得如我前說亦不謗無作者作業及業果報是故所說亦無過失觀法品第十八復次僧佉人言若如所說業及煩惱作者受者皆如乾闥婆城等無有實者此非道理然我我所而亦有體諸外道計有我身相由身所攝諸大種與大種合諸根與諸根合或心心所分別亦然又或計我從思所成餘心所法隨應所計有我我所論者言此說即是於諸蘊中計執有我論者頌言蘊中若有我有即生滅分釋曰如前所說以諸大種及彼諸根分別有身此不可得隨有諸蘊生滅法成此無常義是中遮遣亦復止其法差別故又復若言從思生我即離苦樂等諸思法中無別有我次第起滅云何可見無常性故遮遣常性若於生滅分中有所成者即無常性如是決定止法自相是故非大種與大種合非諸根與諸根合非識住識中根身有我以生法故如外大種若顯明所說此有過失若不明說遮遣法故譬如瓶等無我可得又若不顯明者即自比量相違復次毗婆沙人言此無過失如是異蘊別有我體論者頌言若異蘊有我有即非蘊相釋曰自相不成故何以故聚色成蘊此若有異即應是常常即無作無作即無苦樂等法此與不異相違以無苦樂等違順法生何以故無受者故無思無覺無念無見乃至無知等是中亦無諸法差別若受等有異即受者等此中不成此乃遮遣無彼受者毗婆沙人又言思等因思應有所得此無過失論者言不應因思而言有思此說唯有緣故若有體思此何無過若思與思合有所成者彼思等我是無常性我若是常此即止遣法自相故若其思等決定是常我應非思若思是常即遍一切若或決定有所成義彼勝論師計思為我應有自性云何此中非道理邪以異自性中有所說故若尓即中論所言於一切法悉不應說又僧佉人言有彼覺體成一思相我及覺體次第不壞思亦非無論者言若如此說當有過失且覺與思聲二無異性或覺體合行有我體者若無覺體合行或但有思又彼思法無其自性是中止遣諸法自體或法差別此即異思有思如是決定思無別體即無所依及所緣相差別分別若或別異有我即成多種罪咎又成止遣法差別過或有人言有其現思覺影像生及彼覺體影像所生其二種思此說為思以有如是異境界相覺法境界影像境界此等境界若無所了彼即無思丈夫身相從影像生所說亦然隨諸方分皆有其思所依影像如鏡照面形相亦然有其影像有所持性故有我體如是即有我及我所論者言如彼所說此說皆無我此證成故下頌言若或無有我我所當何有無我無我所我我所即滅釋曰如彼所說因義不成以無因故果即不有此如是等如前所說如實伺察是中云何和合所成若離我我所即如所生得我我所一切平等是人即能見真實理於無我中習熟所得如實義者而彼我所此不可說何以故若無有我何有我所若法決定滅者諸行起時相續果利畢竟無我亦無我所若他計執彼無所有諸法生因因體無故果即不有復次頌言諸業煩惱盡即名為解脫而彼業煩惱從分別中生一法如是故餘法亦復然無定意分別無定故差別釋曰諸煩惱生有種種類如是皆從分別所生而彼煩惱染汙心者即身語意諸所作業如佛所言業在無明中故補特伽羅造非福行若復於彼分別不成是即戲論於世俗諦無實取著何以故戲論空故法無我相是中亦滅現證之法此說畢竟若染汙不染汙閒雜所斷即見人無我唯佛世尊見法無我彼得一切無差別故是故若斷差別法者隨所斷道差別所得故佛世尊亦說有我若或別異有所得者此不和合即成相違如是亦非謗無因果斷心心所相續所成今此相續亦無有斷是故如來施設有我若諸衆生起身見者執有身見於一切法斷其根本故佛為彼說無我法令觀無我不應離此五蘊別取五蘊若能成熟善根趣證一切智智彼增上力佛亦為彼顯示於我譬如幻化帝網若情非情分別建立彼即世俗所行乃為衆生說有所得此無相違今此所說戲論空故住寂滅性為彼開示故下頌言此所說想法想即心境界無生亦無滅如涅槃法性釋曰此所說想謂心境界有體無體若性無性皆悉遮遣住於空性由如是故不應現前所作應現前所作若事若理能取所取執著戲論一切皆息能知所知離諸所說此復云何非有性非無性此說皆空無生無滅法者非有性非無性一切皆如涅槃法性若或如是所顯示法即無所有若於所知或有所說此中應當離諸所作何以故無生無滅如涅槃法性諸法自性寂滅如涅槃法性又諸法自性不生不滅體本寂然亦如涅槃法性或有人言若一切法如涅槃者何故諸佛虛妄宣說斷諸煩惱依勝義諦有世俗諦若如此者即謗無因果斷諸善根是中若言一切皆無彼世俗諦依何而說然彼諸業果報實有現著生死起生死想而復何能猒離諸行論者言老死等法此非不實若不現著生死即不應說諸法無我為令彼等斷煩惱障是故頌言一切實不實釋曰色等五蘊自體無實而我我所亦復無實故應為說諸法無我空性所行又諸菩薩為斷所知障故次下頌言非實非不實釋曰此中意者勝義諦中彼一切法如幻如焰如影像等次下頌言亦實亦不實此即諸佛教釋曰此或所說如其道理今此意者但為利益衆生隨樂分別亦不虛妄或有問言若或遮遣他所分別諸有句義但行真實法者然諸所說皆有彼相此名若唯遮遣句義即有彼此相違此若棄捨即無所取此又何名開顯真實互相違故論者答言然為息除怖名句者故作是說若起正智如實伺察即於諸法決定除疑故論頌言若他信寂靜無戲論所戲無異無分別此即真實相釋曰阿那含人不隨他信不隨他信者謂離有性無性故得寂靜於理事中無能取所取離諸執著復名近寂不為戲論之所戲論亦無對礙此復無尋實無分別無差別義無種種性若無分別即無戲論之所戲論乃名寂靜若彼寂靜即入無分別正智境界若入無分別正智境界即不隨他信若彼如是即能得見真實之相由如是故越語言道若或著他分別句義是故遮遣現前所成彼即無住是故前說即無相違又復顯示實相故論頌言若法從緣有而不即是因亦不異於因故非常非斷釋曰若因若果此中遮遣因果性故譬如世閒非即種有芽非離種有芽此有不常若種子壞滅有芽生起又於相續中因法不住若果生起亦無異法可生是故不斷復次頌言無一義多義不斷亦不常此諸佛世尊正法甘露句釋曰若於諸佛正教法中獲得最上甘露法味此修行者於現生中而獲勝果若或諸行未圓於如是法未成辦者於後生中決定當得若或於佛教中所作習熟設值佛不出世或聲聞滅盡而彼勝緣亦復不空隨諸生中正智常轉復次頌言正覺不出世聲聞復滅盡彼緣覺正智從於猒離生釋曰由其宿昔習熟為因緣覺乃起猒離之智此即是為不隨他信由如是故於此如來正教法中獲真寂靜如理修行所得不虛甲辰歲高麗國大藏都監奉𠡠雕造
