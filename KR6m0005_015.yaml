body:
  text: 安慧菩薩造譯經三藏朝散大夫試鴻臚卿光梵大師賜紫沙門臣惟淨等奉詔譯觀如來品第二十二復有人言勝義諦中諸有相續如來方便取於涅盤有施設因故此若無者彼不如是譬如兔角論者言若勝義諦中如來有者彼即無生云何無生故下頌言即蘊無如來釋曰此說即是墮無常故又能取所取同一體故如次頌言異蘊無如來釋曰此墮常性今此證成比量無體無異蘊故譬如山有草木離蘊如來無體亦然既不離故亦不即蘊如衣盛水同體即有多種過失如次頌言如來無諸蘊釋曰如有財者應名有財此中遮遣能取所取無異性故如是五種審思察時皆無所有如次頌言何處有如來釋曰此畢竟說者勝義諦中悉無所有若如來自體有其所取即一性異性無異知覺此有過失然彼自體所取一性異性悉不可說即無過失若言如來於諸蘊中有其能取所取施設此中應知皆無自體譬如瓶等此說即是能成所成無譬喻故是中遮遣一性異性非同時有復有人言勝義諦中亦有如來有人等相故論者言此中不見有人等相故頌遣言若無有自體云何有他體彼他體既無何有人等相釋曰若人等相因所取有然此亦無彼人等相自體可有復次頌言若法因他有彼無體可生無體故無性云何有如來釋曰若法因他可施設者此亦遮遣彼無體故若自無體即無有性云何如來而可得邪次復云何故下頌言若無有自體云何有他體離自體他體何處有如來釋曰亦無自性異他性故此復云何有所施設復有人言應知如來有其能取以蘊施設故若離於蘊別無一性異性可說非即蘊自體非離蘊自體亦非無自體此義如是論者言此說云何勝義諦中何義可得成立取蘊故頌遣言何名未取蘊自體無別體異蘊亦無取何得有如來釋曰無自體故云何當有自體可得今此如是若或著於能取所取如是即應有其能取以有取故即非如來謂以如來所取無體若或先有如來可取又即如來無異自體如是決定若如來自體若如來所取俱非道理云何異彼諸蘊有能取邪若離如來有所取者如來不成以如來道有相違故如來自體若無能取何有取邪設或有者是中亦無能取所取先後可得謂以生死無先際故是故此說無其過失如是應知能取所取二取和合何所以邪若無能取豈有所取此不有者即無所取云何如來於其能取及彼所取有所成邪謂此所取次第無體故即彼能取諸所作用亦悉不有故非能取所取和合若次第無體者云何人等諸相同時可有若人等所取同時有者各各亦應作如是言我是如來以有如來故復有人言若實如來無所取者即所取次第不同時有若不有者此成過失論者言云何不有謂無執受而所成故非無執受而有所取若有所成執受應有以有所成故或容有所成又先無自體以無執受故此說義成若先有所起此中亦無前已遮遣以無所取而可成故亦非無彼所取返有如來故無能取亦無所取若言所取可得彼人等相同時有者即補特伽羅所取分位云何決定有其所作以無能依所依體故若多種物體同所依者此中應知有多過失於無違順義邊著無常性故又若於彼涅盤之法有所取者此中無義而可施設謂於涅盤著所取故是故無彼補特伽羅所取道理復有人言勝義諦中無如來者云何有其所取施設此非無得亦非不有是故所取亦有施設非如石女不有子故如經中說佛之名者非父母作乃至亦非聖賢所作何以故謂於解脫義邊立名為佛或名世尊論者頌言無一性異性五種求亦無云何所取中施設有如來釋曰如來於所取法中無一異性乃至五種推求悉無所取此若無者勝義諦中即無所有何有所取可施設邪是故勝義諦中無彼所取施設道理復有人言應知因彼色等五蘊此中有其所取可得如是有故亦非能取所取不相因待是故此中乃有能取論者頌言此如是所取自性無所有若無有自性云何有他性釋曰汝意欲成能取所取者即彼所取因他法成以無自體故若法自體本不有者何故因有而有成邪若爾此即能取有施設性又法自體無所有故勝義諦中法因何有所謂諸法因自體故而有他體自體若無云何當有他體可得此中如是有所得者故頌遣言法無自體故能取所取空及一切種空空何有如來釋曰於一切種審伺察時自體他體悉無所有今此觀察如是空故諸所施設亦復皆空譬如幻人長短相等勝義諦中法自性空亦復如是復次頌言空即不可說不空亦不有俱不俱亦然假施設故說釋曰誹謗相違別異句義悉不有故若一切處決定說者或說為有或說為空一切當知皆世俗諦勝義諦中即無性故如尊者提婆所說頌言若不依俗諦即不說勝義若不依勝義即不說涅盤復次本頌言若法有自性見空即無益諸見分別縛今此悉遮遣釋曰如是如來自體空故若有說言如來是常如來是無常亦常亦無常非常非無常或言是有邊或言是無邊亦有邊亦無邊非有邊非無邊此中一切皆悉遮遣有如來故此不有者如兔角等復次頌言寂滅中何有常無常等四寂滅中何有邊無邊等四釋曰所依無體故能依分別亦復不有是故諸法自性寂靜遣諸物體悉不有故復有人言諸蘊處界中有能取施設有施設故此說義成故頌遣言佛種本無性一異不可說不可說即無何施設可有釋曰應當解了如是如來有性無性二法悉離又有人言勝義諦中有如來故謂以如來不說滅後有與不有是故當知此非不有以彼如來無記說故下頌遣言顛倒分別習無執中生執若如來本無即無分別因釋曰如來滅後謂有謂無此諸分別若息滅已而能善解緣生之法是人即能實見如來復次頌言如來自體空思惟不可有云何謂如來滅後有與無釋曰如佛所言彼佛聖尊若如是見如是能觀法性如來諸分別中若有說言如來滅後有不有等一切皆是妄分別見謂有謂無若常無常法身色身能相所相或因或果能覺所覺空不空等一切皆是於戲論中復生戲論下頌遣言佛已過戲論能破諸戲論戲論所覆者彼不見如來釋曰所言不見者謂不能見法性如來如有說言若見緣生即見諸法若見諸法即見如來如經頌言若以色見我以音聲求我是人行邪道不能見如來此中意者若能如是諦觀如來作是觀時即無所有或謂如來有自體者云何是為如來自體所謂即是世閒自體世閒體者即蘊處界等彼世閒自體於勝義諦中即是如來自體如來無體故世閒亦無體勝義諦中所說亦然是故如來施設因性於勝義諦中亦無相續此說無故即當如是諦觀如來亦應如是觀察生死何所以邪故下頌言彼如來自體即世閒自體如來體不成世間亦無體釋曰又復云何是如來體如前廣說即是能取世閒所有施設體故然無少法自體可成此中所說都無自性如前頌言寂滅中何有常無常等四寂滅中何有邊無邊等四觀顛倒品第二十三之一復有人言勝義諦中有蘊處界因緣生故如貪等法彼宗頌言因分別故起說彼貪瞋癡善不善顛倒此等從緣有釋曰彼頌意者如論中說因善不善顛倒分別由是乃起貪瞋癡法如彼廣說論者言此中無是次第可見如前品說如來無自體同世間無體由如是說故此有言詮非勝義諦何所以邪下頌遣言若善不善倒從緣生貪等以煩惱無性故煩惱無實釋曰此無自體因無對待故謂勝義諦中因緣之法不可見故所以者何若無自體即勝義諦中云何有法而可壞邪或謂勝義諦有性或謂世俗諦無性此中一切都無所有如是證成勝義世俗於二諦中悉離有無彼諸煩惱而亦不成云何不成邪此中意者勝義諦中或謂自體若性無性有所成者此即還成勝義諦中有法自性以彼無體故即諸煩惱若有若無而悉不有又彼染心及諸煩惱勝義諦中有無不成以勝義諦中諸法自性皆無體故是故應知煩惱有無亦不成就彼不成故如其廣說應審伺察復次頌言汝意若離我謂有諸煩惱從因緣有者此煩惱悉遮釋曰畢竟說者無有少法煩惱可得復有人言見見諸煩惱有所作故此說即是有彼煩惱論者言此中應知煩惱自體如是亦無所作道理自體所作有相違故亦非別異而有所得若別異者即種種煩惱有所作故下頌遣言有身見煩惱染者亦不有五種求悉無諸蘊亦不有釋曰染心染法五種不有若彼煩惱有別異性即作者作業而有過失若無異性即染與不染而同一體謂諸煩惱無力能故無異體故是故染者染法不即不離此彼不有謂身見故是故染者染法五種不有此復云何故下頌言善不善顛倒彼皆無自體顛倒名虛妄觀如來品說釋曰如是若無彼即不有云何自體有其顛倒以無能覺所覺自性可有今此云何從緣有彼諸煩惱法而能起彼善不善顛倒復有人言若法自體無所有者諸煩惱因當云何有謂以色聲香味觸法此六塵境而能起彼貪瞋癡故此中如是云何分別善不善等畢竟所說是故色等有所緣性以有所緣故如是顛倒非無自體而此色聲香味觸法亦非一向離自體故下頌遣言善不善等法當云何可得如乾闥婆城如焰亦如夢釋曰此說即是世俗所得是故亦無顛倒所緣應知因彼無自體故所有時處諸相續等此中決定亦無所得此法即同乾闥婆城之相又復諸法自體皆空若有妄取尋求緣法所生應知此法如彼陽焰又復法無自體因有所作見前愛樂若因若果有所成法應知此法即是如夢此如是等皆色法故是故此中悉無所得今此意者勝義諦中自性皆空諸法自體皆如幻人虛妄分別有所成故復如影像皆是作者作業事用力故有所生性不相因待假所成故由如是故色等諸法若善不善此中云何有所得邪復次頌言若不因不善善即無施設以因不善故善亦無所有釋曰若不因不善即無有善若因不善可施設者或不善無體善亦無所有復次頌言若不因於善不善無施設以因於善故不善無所有釋曰若不因善不善即無有我若或因於善法亦無有我而可施設是故善不善法悉無所有俱無體故甲辰歲高麗國大藏都監奉𠡠雕造
