body:
  text: 安慧菩薩造西天譯經三藏朝散大夫試鴻臚卿傳梵大師賜紫沙門臣法護奉詔譯觀聖諦品第二十四之餘復次頌言苦法不知故餘斷及作證修習亦復無即無四聖諦釋曰若不知苦即斷集證滅修道不成謂有定性故彼斷證修而悉無體云何當有四聖諦果彼知苦等諸所作用而亦不成此復云何謂以定性有所得故彼復何能有其果邪於三摩地中若有定性亦無所取果無體故無住果者亦無修者如是亦無八種聖人故無僧寶復次頌言若無四聖諦即無有法寶以無法僧故云何當有佛復次頌言不以菩提緣佛墮無緣過不以佛為緣菩提還成過釋曰若佛與菩提自體可成者即互相無因待性故復次頌言若佛有自體無菩提可成無菩薩修行亦無得果者復次頌言不空何所作自體所作無法非法亦無果亦無所有釋曰何所以邪謂離法非法故復次頌言因法非法故是即有其果法非法若生不空何有果釋曰若法生已彼即空故譬如幻人如汝所執非唯汝自破於成就亦破一切故頌遣言汝亦破世間一切所行相以破空義故復壞於緣生復次頌言若破於空義即無法可作此何能發起無作有作者復次頌言世間衆物類老少等變異若自體不滅有定性為常釋曰此即諸物分位離於世間而有所成謂以定性有所得故此亦還成別異過失若尓即應世出世間所證勝法未得者得以無差別故此即盡苦邊際諸有作用及斷煩惱而悉不有謂執不空而有所成故下頌言若見緣生義見非見相應即能見苦集滅道諦亦然釋曰謂以世俗勝義二諦相因待故如是乃能見四聖諦若知諸法皆無自性譬如幻人但依世俗見有生滅此即是為見於苦諦若見諸法猶如幻中雲雨等相於勝義諦而無自性於世俗分見諸行因此即是為見於集諦若法因滅觀於寂靜此即是為見於滅諦若法能見向滅道性此即是為見於道諦此如是等於聲聞乘中謂見諦理若於大乘法中見諦理者如經中説寶迹菩薩白妙吉祥菩薩言若了一切法無生是為知苦若見一切法無住是為斷集若悟一切法畢竟寂滅是為證滅若見一切法無性是為修道觀涅槃品第二十五復次有人引前頌言若一切法空無生亦無滅無斷無所證云何成涅槃釋曰彼宗意者謂內外物體一切皆有若不有者彼諸煩惱及名色等而悉是空如空花等今此所説由斷煩惱證得有餘無餘涅槃若不尓者即彼名色與無餘依而有相違又復此中汝言空者斷與證滅而亦不成若欲成證彼涅槃者如有説言勝義諦中亦非無證是故斷所得滅而證涅槃如是應知以不空故即有所得論者言如我所説亦無相違如幻證滅故於世俗智境此即不滅謂無始因緣展轉有生諸行所起生滅分位皆如幻焰若言不空即無法可成是故亦復不得涅槃故頌遣言若一切不空無生亦無滅無斷無所證云何成涅槃釋曰若法自體而不壞者即彼斷滅亦悉不有此中如實若言諸法無自體者如是乃有涅槃可證此亦難見由此應知若能解了生滅分位皆悉是空不生不滅由彼空故即有生滅此非不空有過失故若一切法空所成者即前所説破散無體應如是有有體無體二法一處即有相違由如是故空義若成即無生滅復次頌言無退亦無得不斷亦不常不滅亦不生此説為涅槃釋曰勝義諦中亦不説有涅槃可得或有説言涅槃有體或有説言涅槃無體或言涅槃二俱無生此如是等皆非實説故下頌言若涅槃有體即墮老死相涅槃非老死而無老死法釋曰此即有體證成有體何所以邪離體無成故如石女子是義應知若涅槃無體此復云何故下頌言若涅槃有體涅槃即有為此乃無有法而是無為者釋曰此即隨前頌説次復云何故下頌言若涅槃有體云何名無取若法體是有何法無取邪釋曰畢竟説者涅槃若有所成體法此即而復何名無成謂無少法於無體中而有所取今此所説以無取故名為涅槃復有人言如所説涅槃應無取中有涅槃邪故頌答言若涅槃有體無體當何有涅槃有體故無無體可成釋曰無所得故此中無體是即證成比量無體今此遮遣善等諸體而悉不有體不成故若以無體而成有體此亦不成此説有體亦云何有若言無者此復云何若或意謂涅槃有體或謂無體此即非是無體可成復次頌言若涅槃無體云何名無取非無體可有涅槃即無取釋曰無體不可取故乃有無取復次頌言有體有生死即有往來相因彼無取故即説為涅槃釋曰因其取故施設有生即有差別皆是世俗非勝義諦復次頌言佛大師所説斷有及非有勝義無無體此即成涅槃復有人言若彼有無共成涅槃應非過失邪故頌答言若有無二法共成涅槃者彼有無二法解脫性不成釋曰有無二法俱不成故此復云何故下頌言涅槃有無成云何得無取而彼有無相二因取故成復次頌言若有無二法共成涅槃者涅槃是無為有無是有為釋曰此即互相有體可取是故有體無體若離相者即非涅槃若有無二法有自體者亦非涅槃一是有體一是滅體二俱無體所以者何謂以涅槃有體無體悉不可説復次頌言若有無二法共成涅槃者彼二非一處如明暗不俱釋曰互相違故同異不合故何處有體邪復有人言如我所解非有非無是涅槃邪故頌答言非非有非無而成於涅槃彼有無二法無能成所成釋曰此若已遣有體無體此復何説非有非無謂彼有無二法自體無所成故復次頌言若非有非無而成涅槃者此有何可説亦有何可取釋曰此中遮遣彼有無等無所作故今此證成二法無體有何可説論者言或有異意於佛如來遍一切處無礙智中執有無者下頌遣言如來涅槃後不説有與無俱有及俱非如來悉不説釋曰如來滅後及現在時即不説有亦不説無亦有亦無非有非無而悉不説亦復不説外道經中身之與神是一是異是故一切所執無體勝義諦中亦無如來亦復不説有涅槃法於彼一切種類法中而悉無彼涅槃可有後復遮遣故下頌言非生死涅槃有少法差別涅槃與生死亦無少差別釋曰謂以生死因果二法所成諸蘊由此施設而彼諸蘊自性空故不生不滅是故不生不滅二法平等以平等故生死涅槃無有差別復次頌言實際涅槃際空際生死際非彼二中間有毫釐差別釋曰法性無差別猶如虛空無方分等諸相分別此中意者諸法空性即成涅槃所成法中若謂決定有所得者彼即是空一切異見諸有言説無體可説亦非勝義諦中有彼諸見而可成故是故如來滅後有不有等常無常等邊無邊等而悉不説頌總攝言依止於涅槃先際及後際説常等邊等有無等諸見釋曰如其次第此説應知復次頌言若諸法皆空何有邊無邊亦有亦無邊非有非無邊復次頌言何一性異性何有常無常亦常亦無常非常非無常釋曰分別自性無所依止此中意者分別無體故復有人言勝義諦中有其涅槃彼有所得謂佛世尊以清淨意分別説法於勝義諦中亦有法可説復次論者以頌遣言諸所得皆寂遠離諸嬈惱無我無所成諸法無所得釋曰法自性空故一切分別而亦止息謂以法性本無所生故佛亦無少法可説但以作業所依而有所成種種施設有性皆空於諸行中故佛亦無少法可説觀夢幻品第二十六復次論者謂餘人言今此如是應知所説皆如夢幻有所和合彼諸趣等差別分別亦如乾闥婆城諸行所起皆是緣生此等廣説皆謂證成世俗緣生對治之法有所宣説此説皆是不顛倒義故下頌言衆生無明覆後復起三行由三行造業生人等諸趣釋曰言三行者謂身語意見所造作又謂福行罪行及不動行復次頌言以行為因故而取著於識由著彼識故增長於名色釋曰此畢竟説因名故有色積色成蘊故名色蘊復次頌言由名色增故而生於六處六處隨起觸所生如次説復次頌言因眼及與色與名色為緣如是法和合是故識生起釋曰是中復以作意和合如彼眼識與名色為緣有所生起餘耳識等與名色為緣有所生起所説亦然復次頌言由眼色識三故能生於觸從觸復起受此受相三種復次頌言因受起於愛以受故愛生從愛生於取所取有四種釋曰此復云何所言取者謂欲取愛取戒禁取我語取等復次頌言因取故有有謂取者有故若無取解脫是故無彼有復次頌言有者謂五蘊從蘊故起生生故有老死及憂悲苦等釋曰何名五蘊此説即是五取蘊故由此有彼諸衆生聚諸行生起復次頌言諸憂悲苦惱皆從生所起如是即唯有一大苦蘊生釋曰此中云何而能息滅生法相續一大苦蘊諸所起作謂即應離我所自性復次頌言此無明及行為生死根本智者於無明而不見有體釋曰若見諸行有所造作而生過失此即無明及行與彼生死乃為根本何以故諸行造作故智者不然不見諸行有所造作實智正觀不見有生何以故見真實故復次頌言若無明息滅諸行亦復滅無明行滅故智者如是修釋曰種子滅故牙等不生勝義諦中諸法無體十二緣生智所習力無明等滅自體滅故諸行何有復次頌言滅法對治生即真實所轉此一大苦蘊如是苦皆滅釋曰所謂有支輪回息滅彼識亦滅以識滅故乃至生老死法皆滅世俗諦可取勝義諦無生諸緣生等法此復云何滅甲辰歲高麗國大藏都監奉敕雕造
