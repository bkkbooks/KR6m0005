body:
  text: 安慧菩薩造譯經三藏朝散大夫試鴻臚卿光梵大師賜紫沙門臣惟淨等奉詔譯觀因果品第二十之餘復次頌言因生果已滅而復何有滅又若因住果離果何有住釋曰此義云何若果滅已不與因合若法生已而不重生如是果法若已生者不與因合未生亦不合亦無生已重生道理而此果體無所依故何能生果若法未生即因果二體俱無相續若同時因果此已遮遣何能生果又未生之法此即是無今此所說亦復遮遣眼識等緣此中亦無已見之法因能生果且如眼根與眼識為因若見色已即眼識不生謂已見色故眼識若生相違無用若未見色眼識不生即墮過失耳等諸識亦復如是如應所說作是觀察前所說果此止餘義後復遮遣故下頌言無彼過去因與過去果合亦無未生果與已生因合釋曰所言合者此說有生謂以過去因果二法俱無體故無未生因與過去果和合有生因果二法性差別故若過去若未生二俱無體時分差別無有和合復次頌言亦無未生因與已生果合已生即不見有和合可得釋曰此亦遮遣因果二法同時而有時分差別故若有體無體此中如是審伺察時因果二法而悉無有和合可得復次頌言若法無和合因何能生果若法有和合因何能生果釋曰此無有生亦無和合能生法徧若不生時如是和合皆為徧計若以二法和合同生此即相違復次頌言因果若是空云何能生果因果若不空云何能生果釋曰體性空故如餘物體又復因離果故復次頌言不空即不生不空即不滅以得不空故不生亦不滅釋曰若自體空自果亦然若謂自體有所生者或無自性又復云何果法不生若果有自體因亦不生若法自體定有性者是即不從因緣所生若法不生即云何滅謂以自性離所作故非此所說欲令因果有生有滅前說亦然生法自體若有所得此即不生增上所作如後頌言空即云何生空亦云何滅以空故不生以空故不滅釋曰若先自體所得皆空體即不有如石女之子無所生故若無自體法即不生法既不生云何有滅此中有問如先所說因果二法為一性邪為異性邪或共有邪故頌荅言因果若一性即無法可生因果若異性亦無法可生釋曰何所以邪若因果二法一處有者即能生所生同見生滅如父子有異非一體可見是故遮遣一性異性若因若果能生所生等此中如是如有因言因果若異性因即同非因若果異體即比量無因此即止其非因因有異故果亦遮遣復次頌言果自體若有因即何能生果自體若無因亦何能生釋曰若有若無非果體可有若無所有亦非有因能生於果此即亦無見因可有又若因為能生者即因自體亦復不能生於果法此即因無和合因若不能生云何當得果若彼如是因不能生此中果法亦無所得以果無體故復有人言亦非因果一向有成但以因緣和合所成故頌遣言亦非因緣成亦非自體有又非和合生此何能生果釋曰若此因果和合假立法體如是決定亦無力用能生此說云何自體生果是中亦非和合所作故無和合所成有果是故都無果生道理應知諸法不從因緣和合生果此亦不離因緣所成復次數論師言當知諸法若有物體即有和合謂以自類無別異故譬如自體故頌遣言若因緣和合所作得成者果若無集因即因緣不合釋曰果體不有即無所生是故應知諸法不有云何是中有所成邪觀成壞品第二十一復次數論師言勝義諦中應知有時為成壞因此非不有如兔角等若有成壞證成我義論者言汝說不成法中亦無成壞可得所言成壞二法者為互相有體共成壞邪為各離邪若離若共俱無成壞若離若共無成壞者非汝語中而可信解此如前說故頌遣言離成無有壞離壞亦無成共成無有壞共壞亦無成釋曰亦無有成此說畢竟如離於生亦無死法因有生故而即有死成壞亦然若不因壞而即無成若不因成亦即無壞此中如是汝言成壞皆是虛說成壞二法互相違故亦非一處藂雜有生若法未生而有死者此墮過失復次頌言壞法亦如成無共離道理成法亦如壞無共離道理釋曰今此所說是義應知復次頌言離壞若有成云何當可得法體無常徧無處而不有釋曰此說義者無所有故何所以邪謂自體無常故譬如無常自體復次頌言若離成有壞云何當可得亦如生與死非同時而有釋曰若法未生即無壞體可得和合以生死等互相違故是故應知審觀察時如下頌言若二互共成彼二互無有成壞二無故云何有成就釋曰彼無所有二種別異無所成故即汝此中因義不成謂以諸法自性壞故亦無成壞二法同生以其壞法自所得因先無有體為所依故成法無體其義亦然復有人言若如此說無成法者豈非自體無間相續有所得邪論者言此何說邪若彼壞法決定破散先無自體即無相續成即不有故知不盡亦無有壞盡與不盡亦復無壞此義如是應知諸法無成亦然盡無壞故先無體成法即不有亦非先無法體後有成壞謂此二法俱無物體是故無盡亦無有壞無法成壞故無有一體互相違故如別義者復次頌言盡即無有成不盡亦無成盡即無有壞不盡亦無壞釋曰非語表中能成是義謂二法中若無有成成即無體是故壞法亦無所有復次數論師言若法先無其體或破散無體者然諸物相因有體故因若有體果即亦有若先無體及破散無體者是即都無此中如是極難成立云何可說能法所法若因若果而有所得豈無過邪論者言如是應知一切法中先無有成因即無體亦無有果若破散無體或於果時有因性者先亦無體故諸法同時破散無體又或果體若未成熟或因無先體又復諸法分位壞時此即皆是破散無體設使同時又先分位已離後分位不成如是應知因離自體畢竟無成無別分位故如分位自體此中因壞此即不有若先法破散無體或復離已有其物體如是分位而可合者此所不見非道理故復有人言如是諸法皆有成壞有法體故此若無者即彼諸法應悉無體如兔角鉤論者言成壞法中離成無壞離壞無成今此應問所言成壞者為體空故有為體不空故有或共有邪故頌荅言彼成壞二法非空故可有又成壞二法非不空可有釋曰此即不有自性空故如空花等若不見成成即無體云何有壞無自體時成即不生是故亦無壞法可有自性本無別異法體此中復問成壞二法為一性有為異性有或共有邪故頌荅言此成壞二法非一性可有此成壞二法亦非異性有釋曰譬如貪與離貪成壞亦然二非和合若一物體同所依止即無別異若或自體有決定性即一切法乃說為常諸法亦非自體有法與異法合若成壞二法或有所見彼非可見分量而有云何此中有可見道理若見諸法有成壞者當知皆是愚癡所見若於勝義諦中見成壞者決定非彼勝義諦有以彼勝義諦中無所有故有見皆是愚者妄見如是所說此云何知謂有體無體非和合故此若有彼體無體者即彼體及無體二皆有性故頌遣言有體不生體無體不生體體不生無體有無體不生釋曰因果二法不同生故若同生者即能生所生彼不成故又法無分位故即無有體可說生滅以無物故體無體二有與不有此復云何若法有生者為自體生邪為佗體生邪或共生邪故頌遣言法不從自生云何從佗生自佗既不生如所生亦然釋曰如前廣說此義應知今此觀察云何有生亦無所生此說畢竟次復云何若法有生墮斷常見此中云何諸法自體若常無常有即是常非壞滅性此著常見無即無常是壞滅性此著斷見復有人言我說諸法悉有所得然亦不著彼斷常見此說究竟云何我此所說究竟云何不著斷常二見如有頌言滅已不復生因即墮於斷若生滅相續故因果有體釋曰如汝所說中有分位還成斷過次復云何故下頌言若法住自體無法有分位至涅盤時斷即諸法斷滅釋曰謂法自性離所作故亦無因果生滅可有不墮於常此復云何如阿羅漢入涅槃時化火焚身汝謂燒已相續斷滅此即不遮若謂無體無斷常見比亦不然復次頌言死有若已滅取初有不然死有若未滅取初有不然釋曰言死有者謂生有謝滅故名生死此中亦無死有滅已初有即如何以故墮無因故或言有者此非道理是中云何滅時能有復次頌言若初有滅時而死有生者滅時是一有生時是異有釋曰此即滅時少分已滅少分未滅生時亦然少分已生少分未生若滅法如是即生法亦然由如是故乃墮二有復次頌言亦無法滅時與生時和合是即同所依此滅彼蘊生釋曰若死有滅時不與生有和合所言滅者無故名滅謂死有初有二不和合故若此有者如是即應蘊有所依由如是故此即有生若或別異生時中無有生是故當知此中悉無二有可得復次頌言如是此三時有相續不然若無彼三時云何有相續有相續若無云何有成壞若無彼成壞法云何可成甲辰歲高麗國大藏都監奉𠡠彫造
